<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Demo</title>
  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }
    header { background:#222; color:#fff; padding:15px; text-align:center; }
    .container { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap:15px; padding:20px; }
    .product { background:#fff; padding:15px; border-radius:10px; text-align:center; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    .product img { width:100%; height:150px; object-fit:cover; }
    button { padding:10px; border:none; background:#28a745; color:white; cursor:pointer; border-radius:5px; }
    button:hover { background:#218838; }
    #cart { position:fixed; right:0; top:0; width:250px; height:100%; background:#fff; border-left:2px solid #ddd; padding:10px; overflow:auto; }
  </style>
</head>
<body><header>
  <h1>My E-Commerce Store</h1>
</header><div class="container" id="product-list"></div><div id="cart">
  <h2>Cart</h2>
  <ul id="cart-items"></ul>
  <h3>Total: $<span id="total">0</span></h3>
</div><script>
  const products = [
    {id:1, name:"T-Shirt", price:10, img:"https://via.placeholder.com/200"},
    {id:2, name:"Shoes", price:30, img:"https://via.placeholder.com/200"},
    {id:3, name:"Watch", price:50, img:"https://via.placeholder.com/200"},
    {id:4, name:"Cap", price:8, img:"https://via.placeholder.com/200"}
  ];

  const cart = [];

  function displayProducts(){
    const list = document.getElementById("product-list");
    products.forEach(p => {
      const div = document.createElement("div");
      div.className = "product";
      div.innerHTML = `
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>$${p.price}</p>
        <button onclick="addToCart(${p.id})">Add to Cart</button>
      `;
      list.appendChild(div);
    });
  }

  function addToCart(id){
    const product = products.find(p => p.id === id);
    cart.push(product);
    updateCart();
  }

    const total = document.getElementById("total");
    cartItems.innerHTML = "";

      const li = document.createElement("li");
      li.textContent = item.name
