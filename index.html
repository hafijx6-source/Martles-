<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Martles</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: Arial, sans-serif;
  background:#eaeded;
}

/* HEADER */
header{
  background:#131921;
  color:#fff;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
}

.logo{
  font-size:20px;
  font-weight:bold;
  color:#ff9900;
}

.search-box{
  flex:1;
  display:flex;
}

.search-box input{
  width:100%;
  padding:10px;
  border:none;
}

.search-box button{
  background:#febd69;
  border:none;
  padding:10px 15px;
  cursor:pointer;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.product{
  background:#fff;
  padding:10px;
  border-radius:5px;
}

.product img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.product h3{
  font-size:14px;
  margin:5px 0;
}

.price{
  color:#b12704;
  font-weight:bold;
}

.btn{
  background:#ffd814;
  border:1px solid #fcd200;
  padding:8px;
  width:100%;
  margin-top:5px;
  cursor:pointer;
}

/* NAVBAR */
.navbar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #ccc;
}
</style>
</head>

<body>

<header>
  <div class="logo">Martles</div>

  <div class="search-box">
    <input type="text" id="search" placeholder="Search Martles">
    <button onclick="search()">🔍</button>
  </div>
</header>

<div class="products" id="products"></div>

<div class="navbar">
  <div onclick="home()">🏠 Home</div>
  <div onclick="cartPage()">🛒 Cart</div>
</div>

<script>
const products=[];
for(let i=1;i<=12;i++){
  products.push({
    id:i,
    title:"Product "+i,
    price:(i*10),
    img:`https://picsum.photos/200?random=${i}`
  });
}

let cart=[];

function render(data){
  const p=document.getElementById("products");
  p.innerHTML="";
  data.forEach(item=>{
    p.innerHTML+=`
    <div class="product">
      <img src="${item.img}">
      <h3>${item.title}</h3>
      <div class="price">$${item.price}</div>
      <button class="btn" onclick="add(${item.id})">Add to Cart</button>
    </div>`;
  });
}

function add(id){
  cart.push(id);
  alert("Added to cart");
}

function search(){
  const val=document.getElementById("search").value.toLowerCase();
  const filtered=products.filter(p=>p.title.toLowerCase().includes(val));
  render(filtered);
}

function home(){
  render(products);
}

function cartPage(){
  alert("Cart Items: "+cart.length);
}

render(products);
</script>

</body>
</html>
